<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Server-Side Overlay</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        #erddap-widget { background: white; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: auto; border: 1px solid #eee; background-color: #fafafa; min-height: 300px; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <button class="update-btn" onclick="updateAllMaps()">Update All Maps</button>
    </div>
</div>

<div class="data-grid">
    <div class="card"><h3>Daily Chlorophyll</h3><img id="img-daily-chla"></div>
    <div class="card"><h3>Weekly Chlorophyll</h3><img id="img-weekly-chla"></div>
    <div class="card"><h3>SST</h3><img id="img-sst"></div>
    <div class="card"><h3>Wind Speed</h3><img id="img-wind"></div>
    <div class="card"><h3>C-HARMS (PN)</h3><img id="img-charms"></div>
    <div class="card"><h3>C-HARMS (Salinity)</h3><img id="img-charms-salt"></div>
</div>

<script>
function updateAllMaps() {
    const sLat = document.getElementById('latMin').value;
    const nLat = document.getElementById('latMax').value;
    const wLon = document.getElementById('lonMin').value;
    const eLon = document.getElementById('lonMax').value;

    // The Station Layer: Definining the table first is often more reliable for the Mixed-Mode renderer
    const tablePart = `&.tDatasetID=erdCalCOFIstns&.tXVar=longitude&.tYVar=latitude` + 
                     `&.tFilter=(cruise=%22202304%22,line>84,station<=70)` +
                     `&.markerType=square&.markerSize=8&.markerColor=0xff0000`; // RED SQUARE

    function setImg(id, base, gridVar, dims, colors, isCharms=false) {
        let lMin = sLat, lMax = nLat, wMin = wLon, wMax = eLon;
        
        if (isCharms) {
            lMin = Math.max(29.1, Math.min(43, sLat));
            lMax = Math.max(29.1, Math.min(43, nLat));
            wMin = Math.max(-127.5, Math.min(-116.1, wLon));
            wMax = Math.max(-127.5, Math.min(-116.1, eLon));
        }

        const gridPart = `?${gridVar}[(last)]${dims}[(${lMin}):(${lMax})][(${wMin}):(${wMax})]&.vars=longitude|latitude|${gridVar}&.colorBar=${colors}`;
        const mapPart = `&.draw=mixed&.latMin=${lMin}&.latMax=${lMax}&.lonMin=${wMin}&.lonMax=${wMax}`;
        
        document.getElementById('img-' + id).src = base + ".png" + gridPart + tablePart + mapPart;
    }

    setImg('daily-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily', 'chlor_a', '[(0.0)]', 'Rainbow2|||.03|5|');
    setImg('weekly-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly', 'chlor_a', '[(0.0)]', 'Rainbow2|||.03|5|');
    setImg('sst', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', 'CRW_SST', '', 'CoolRobot|||10|25|');
    setImg('wind', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day', 'wind_speed', '[(10.0)]', '|||0|15|');
    setImg('charms', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', 'pseudo_nitzschia', '', '', true);
    setImg('charms-salt', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', 'salinity', '', '|||31|35|', true);
}

window.onload = updateAllMaps;
</script>
</body>
</html>
