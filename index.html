<script>
function updateAllMaps() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

    // Refined Table Overlay Logic - Using explicit variable mapping
    function getMixer(minL, maxL, minO, maxO) {
        return `&.tDatasetID=erdCalCOFIstns` +
               `&.tXVar=longitude&.tYVar=latitude` + 
               `&.tFilter=(cruise=%22202304%22,line>84,station<=70)` + // Removed lat/lon filter from table to let Map handle it
               `&.markerType=circle&.markerSize=7&.markerColor=0xFFFF00&.markerOutlineColor=0x000000` +
               `&.latMin=${minL}&.latMax=${maxL}&.lonMin=${minO}&.lonMax=${maxO}&.draw=mixed`;
    }

    function setContent(id, baseUrl, gridVar, extraDims, colorBar, isCharms = false) {
        let fSLat = sLat, fNLat = nLat, fWLon = wLon, fELon = eLon;

        if (isCharms) {
            // Updated C-HARMS clamp settings: 31.3, 43, -127.5, -117
            fSLat = clamp(sLat, 31.3, 43);
            fNLat = clamp(nLat, 31.3, 43);
            fWLon = clamp(wLon, -127.5, -117);
            fELon = clamp(eLon, -127.5, -117);
        }

        const gridPart = `?${gridVar}[(last)]${extraDims}[(${fSLat}):(${fNLat})][(${fWLon}):(${fELon})]&.vars=longitude|latitude|${gridVar}&.colorBar=${colorBar}`;
        const url = baseUrl + ".png" + gridPart + getMixer(fSLat, fNLat, fWLon, fELon);
        
        document.getElementById('img-' + id).src = url;
        document.getElementById('lnk-' + id).href = baseUrl + ".graph" + gridPart + getMixer(fSLat, fNLat, fWLon, fELon);
    }

    // Set content for all 10 products
    setContent('daily-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily', 'chlor_a', '[(0.0)]', 'Rainbow2|||.03|5|');
    setContent('weekly-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly', 'chlor_a', '[(0.0)]', 'Rainbow2|||.03|5|');
    setContent('sst', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', 'CRW_SST', '', '|||10|22|');
    setContent('sst-anom', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', 'CRW_SSTANOMALY', '', 'BlueWhiteRed|||-2|2|');
    setContent('sardine', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/sardine_habitat_viirs_v2', 'potential_habitat_classification', '', '');
    setContent('ssh', 'https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily', 'ssh', '', '|||-.5|.5|');
    setContent('wind', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day', 'wind_speed', '[(10.0)]', '|||0|15|');
    setContent('sss', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/coastwatchSMOSv662SSS3day', 'sss', '[(0.0)]', '|||31|35|');
    
    // C-HARMS Products
    setContent('charms', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', 'pseudo_nitzschia', '', '', true);
    setContent('charms-salt', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', 'salinity', '', '|||31|35|', true);
}
</script>
