<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Final Alignment</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        #erddap-widget { background: white; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; max-width: 1200px; margin: 0 auto 20px auto; }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .map-container { position: relative; width: 100%; display: inline-block; overflow: hidden; background: #eee; }
        .card img { width: 100%; height: auto; display: block; }
        
        /* THE FIX: This container defines the "Map Only" area of the ERDDAP image */
        .station-overlay { 
            position: absolute; 
            top: 5.5%;    /* Push down to skip Title */
            left: 7.4%;   /* Push right to skip Lat Labels */
            width: 89.2%; /* Width of the actual data plot */
            height: 72.0%; /* HEIGHT ADJUSTED: Stops exactly at the bottom of the map, before the legend */
            pointer-events: none; 
            overflow: visible;
        }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>
<p style="text-align:center; color:#666;">Cruise 202304 | Fixed Latitude Alignment</p>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <button class="update-btn" onclick="updateAllMaps()">Update All Maps</button>
    </div>
</div>

<div class="data-grid">
    <div class="card"><h3>Daily Chlorophyll</h3><div class="map-container"><img id="img-chla"><svg id="ovl-chla" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div>
    <div class="card"><h3>SST</h3><div class="map-container"><img id="img-sst"><svg id="ovl-sst" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div>
    <div class="card"><h3>Wind Speed</h3><div class="map-container"><img id="img-wind"><svg id="ovl-wind" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div>
    <div class="card"><h3>C-HARMS (PN)</h3><div class="map-container"><img id="img-charms"><svg id="ovl-charms" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div></div>
</div>

<script>
const stationData = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

function updateAllMaps() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    const coords = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;
    document.getElementById('img-chla').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`;
    document.getElementById('img-sst').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png?CRW_SST[(last)]${coords}&.vars=longitude|latitude|CRW_SST`;
    document.getElementById('img-wind').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day.png?wind_speed[(last)][(10.0)]${coords}`;

    const cSLat = Math.max(31.3, sLat), cNLat = Math.min(43, nLat);
    const cWLon = Math.max(-127.5, wLon), cELon = Math.min(-117, eLon);
    document.getElementById('img-charms').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180.png?pseudo_nitzschia[(last)][(${cSLat}):(${cNLat})][(${cWLon}):(${cELon})]`;

    ['chla', 'sst', 'wind', 'charms'].forEach(id => {
        const svg = document.getElementById('ovl-' + id);
        svg.innerHTML = '';
        let minL = sLat, maxL = nLat, minO = wLon, maxO = eLon;
        if (id === 'charms') { minL = cSLat; maxL = cNLat; minO = cWLon; maxO = cELon; }

        stationData.forEach(st => {
            const x = ((st.lon - minO) / (maxO - minO)) * 100;
            const y = 100 - (((st.lat - minL) / (maxL - minL)) * 100);
            if (x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", "1.6"); c.setAttribute("fill", "yellow");
                c.setAttribute("stroke", "black"); c.setAttribute("stroke-width", "0.5");
                svg.appendChild(c);
            }
        });
    });
}
window.onload = updateAllMaps;
</script>
</body>
</html>
