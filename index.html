<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        /* Each map container is now a real Leaflet div */
        .map-box { height: 400px; width: 100%; border: 1px solid #eee; border-radius: 4px; background: #fafafa; }
        
        .card h3 { margin: 10px 0 5px; color: #34495e; }
        .btn { background: #2c3e50; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<h1>Satellite Monitoring of CalCOFI region</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116"></div>
        <button class="btn" onclick="updateAll()">Update All Maps</button>
    </div>
</div>

<div class="data-grid">
    <div class="card"><h3>Daily Chlorophyll</h3><div id="map-chla" class="map-box"></div></div>
    <div class="card"><h3>SST</h3><div id="map-sst" class="map-box"></div></div>
    <div class="card"><h3>Salinity</h3><div id="map-salt" class="map-box"></div></div>
    <div class="card"><h3>SST Anomaly</h3><div id="map-anom" class="map-box"></div></div>
</div>
