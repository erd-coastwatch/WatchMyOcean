<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Precision Overlay</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; }
        #controls { background: white; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; max-width: 1200px; margin: 0 auto 20px auto; display: flex; gap: 10px; align-items: flex-end; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.7em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .map-div { height: 400px; width: 100%; background: #1a1a1a; border-radius: 4px; }
        h3 { margin: 10px 0; font-size: 1em; text-align: center; color: #34495e; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="controls">
    <div class="input-group"><label>S Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
    <div class="input-group"><label>N Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
    <div class="input-group"><label>W Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
    <div class="input-group"><label>E Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
    <button class="update-btn" onclick="updateAll()">Update Dashboard</button>
</div>

<div class="grid" id="mapGrid"></div>

<script>
// Static Points (Cruise 202304)
const stations = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

const products = [
    { id: 'chla', name: 'Daily Chlorophyll', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png', var: 'chlor_a', extra: '[(0.0)]', color: 'Rainbow2|||.03|5|' },
    { id: 'sst', name: 'SST', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png', var: 'CRW_SST', extra: '', color: '|||12|24|' },
    { id: 'wind', name: 'Wind Speed', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day.png', var: 'wind_speed', extra: '[(10.0)]', color: '' },
    { id: 'charms', name: 'C-HARMS (PN)', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180.png', var: 'pseudo_nitzschia', extra: '', color: '', charms: true }
];

const maps = {};

// Build Grid
const grid = document.getElementById('mapGrid');
products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${p.name}</h3><div id="map-${p.id}" class="map-div"></div>`;
    grid.appendChild(card);

    maps[p.id] = L.map(`map-${p.id}`, { attributionControl: false, zoomControl: false, crs: L.CRS.EPSG4326 });
});

function updateAll() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    products.forEach(p => {
        const m = maps[p.id];
        m.eachLayer(l => m.removeLayer(l));

        let curSLat = sLat, curNLat = nLat, curWLon = wLon, curELon = eLon;
        if (p.charms) {
            curSLat = Math.max(31.3, sLat); curNLat = Math.min(43, nLat);
            curWLon = Math.max(-127.5, wLon); curELon = Math.min(-117, eLon);
        }

        const bounds = [[curSLat, curWLon], [curNLat, curELon]];
        const imgUrl = `${p.url}?${p.var}[(last)]${p.extra}[(${curSLat}):(${curNLat})][(${curWLon}):(${curELon})]&.draw=surface&.vars=longitude|latitude|${p.var}&.colorBar=${p.color}`;

        // Add "Clean" Satellite Image
        L.imageOverlay(imgUrl, bounds).addTo(m);

        // Add Static Stations
        stations.forEach(st => {
            if (st.lat >= curSLat && st.lat <= curNLat && st.lon >= curWLon && st.lon <= curELon) {
                L.circleMarker([st.lat, st.lon], { radius: 3, fillColor: "yellow", color: "black", weight: 1, fillOpacity: 1 }).addTo(m);
            }
        });

        m.fitBounds(bounds);
    });
}

window.onload = updateAll;
</script>
</body>
</html>
