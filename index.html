<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Precision Alignment</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; }
        #controls { background: white; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; max-width: 1200px; margin: 0 auto 20px auto; display: flex; gap: 10px; align-items: flex-end; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.7em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .map-div { height: 400px; width: 100%; background: #cdf; border-radius: 4px; }
        h3 { margin: 10px 0; font-size: 1em; text-align: center; color: #34495e; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="controls">
    <div class="input-group"><label>S Lat</label><input type="number" id="latMin" value="29"></div>
    <div class="input-group"><label>N Lat</label><input type="number" id="latMax" value="39"></div>
    <div class="input-group"><label>W Lon</label><input type="number" id="lonMin" value="-127"></div>
    <div class="input-group"><label>E Lon</label><input type="number" id="lonMax" value="-116"></div>
    <button class="update-btn" onclick="updateAll()">Update Maps</button>
</div>

<div class="grid" id="mapGrid"></div>

<script>
// Static Points - Defined exactly by coordinate
const stations = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

const products = [
    { id: 'chla', name: 'Daily Chlorophyll', layer: 'nesdisVHNnoaa20chlaDaily:chlor_a', url: 'https://coastwatch.pfeg.noaa.gov/erddap/wms/nesdisVHNnoaa20chlaDaily/request', style: 'boxfill/Rainbow2' },
    { id: 'sst', name: 'SST', layer: 'NOAA_DHW:CRW_SST', url: 'https://coastwatch.pfeg.noaa.gov/erddap/wms/NOAA_DHW/request', style: 'boxfill/CoolRobot' },
    { id: 'wind', name: 'Wind Speed', layer: 'erdQCwindproducts1day:wind_speed', url: 'https://coastwatch.pfeg.noaa.gov/erddap/wms/erdQCwindproducts1day/request', style: 'boxfill/Rainbow' },
    { id: 'charms', name: 'C-HARMS (PN)', layer: 'wvcharmV3_3day_LonPM180:pseudo_nitzschia', url: 'https://coastwatch.pfeg.noaa.gov/erddap/wms/wvcharmV3_3day_LonPM180/request', style: 'boxfill/Rainbow' },
    { id: 'ssh', name: 'SSH', layer: 'noaacweddymesiplusdaily:ssh', url: 'https://coastwatch.noaa.gov/erddap/wms/noaacweddymesiplusdaily/request', style: 'boxfill/Rainbow' },
    { id: 'sss', name: 'Salinity (SMOS)', layer: 'coastwatchSMOSv662SSS3day:sss', url: 'https://coastwatch.pfeg.noaa.gov/erddap/wms/coastwatchSMOSv662SSS3day/request', style: 'boxfill/Rainbow' }
];

const maps = {};

// 1. Build the Grid
const grid = document.getElementById('mapGrid');
products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${p.name}</h3><div id="map-${p.id}" class="map-div"></div>`;
    grid.appendChild(card);

    // Initialize Leaflet Map
    const m = L.map(`map-${p.id}`, { 
        attributionControl: false, 
        zoomControl: false,
        crs: L.CRS.EPSG4326 // Crucial: This matches ERDDAP's coordinate system exactly
    });
    maps[p.id] = m;
});

function updateAll() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);
    const bounds = [[sLat, wLon], [nLat, eLon]];

    products.forEach(p => {
        const m = maps[p.id];
        m.eachLayer(l => m.removeLayer(l)); // Clear old layers
        
        // 2. Add the WMS Satellite Layer (Direct Mapping)
        L.tileLayer.wms(p.url, {
            layers: p.layer,
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            styles: p.style,
            crs: L.CRS.EPSG4326
        }).addTo(m);

        // 3. Add the Static Stations (Direct Mapping)
        stations.forEach(st => {
            L.circleMarker([st.lat, st.lon], {
                radius: 4,
                fillColor: "yellow",
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(m);
        });

        m.fitBounds(bounds);
    });
}

window.onload = updateAll;
</script>
</body>
</html>
